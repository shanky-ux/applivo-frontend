kind = "web"
previewPath = "/"
title = "Applivo — AI Job Application Automation"
version = "1.0.0"
id = "artifacts/applivo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25102
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/applivo run dev"

[services.env]
PORT = "25102"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/applivo", "run", "build"]
publicDir = "artifacts/applivo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
